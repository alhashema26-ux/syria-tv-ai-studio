<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جارٍ المعالجة... - Syria TV AI Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1729;
            --navy-light: #1e2942;
            --orange: #f97316;
            --orange-dark: #ea580c;
            --gray-100: #f1f5f9;
            --gray-600: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .box {
            background: white;
            padding: 52px 44px;
            border-radius: 18px;
            box-shadow: 0 12px 32px rgba(15, 23, 41, 0.14);
            text-align: center;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }
        .box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--navy) 0%, var(--orange) 100%);
        }
        .spinner {
            width: 58px;
            height: 58px;
            border: 5px solid #e2e8f0;
            border-top-color: var(--orange);
            border-radius: 50%;
            margin: 8px auto 26px;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 18.5px; margin-bottom: 10px; color: var(--navy); font-weight: 800; }
        p { color: var(--gray-600); font-size: 14px; line-height: 1.8; }
        .steps {
            margin-top: 22px; font-size: 12.5px; color: #94a3b8;
            padding-top: 18px; border-top: 1px solid #e2e8f0; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2>⏳ جارٍ معالجة التقرير...</h2>
        <p>النظام يعمل الآن على تحليل النص وتوليد المحتوى المطلوب. هذه الصفحة ستنتقل تلقائياً عند الانتهاء.</p>
        <div class="steps" id="statusText">جارٍ التحقق من الحالة...</div>
    </div>

    <script>
        const jobId = "{{ job_id }}";

        async function checkStatus() {
            try {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();

                if (data.status === "done" || data.status === "error") {
                    window.location.href = `/result/${jobId}`;
                } else if (data.status === "not_found") {
                    document.getElementById("statusText").textContent = "⚠️ لم يتم العثور على المهمة";
                } else {
                    document.getElementById("statusText").textContent = "جارٍ المعالجة بالخلفية...";
                    setTimeout(checkStatus, 3000);
                }
            } catch (e) {
                document.getElementById("statusText").textContent = "جارٍ إعادة المحاولة...";
                setTimeout(checkStatus, 3000);
            }
        }

        setTimeout(checkStatus, 2000);
    </script>
</body>
</html>
